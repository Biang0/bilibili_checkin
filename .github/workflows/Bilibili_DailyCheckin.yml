# ==============================================
#  B站每日自动签到 + 自动清日志 + 15天保活
#  时间：每天 凌晨 01:00（北京时间）
# ==============================================
name: Bilibili每日签到+清日志+15天保活

on:
  schedule:
    - cron: '0 17 * * *'  # UTC 17:00 = 北京时间 凌晨 01:00
  workflow_dispatch:      # 允许手动触发

jobs:
  # ==============================================
  #  任务1：B站自动签到、投币、做任务
  # ==============================================
  bilibili-task:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests loguru

      - name: 执行B站签到
        env:
          BILIBILI_COOKIE: ${{ secrets.BILIBILI_COOKIE }}
          PUSH_PLUS_TOKEN: ${{ secrets.PUSH_PLUS_TOKEN }}
          TASK_CONFIG: ${{ secrets.TASK_CONFIG }}
          COIN_ADD_NUM: ${{ secrets.COIN_ADD_NUM }}
          COIN_SELECT_LIKE: ${{ secrets.COIN_SELECT_LIKE }}
          COIN_VIDEO_SOURCE: ${{ secrets.COIN_VIDEO_SOURCE }}
        run: python main.py

  # ==============================================
  #  任务2：每次运行后立即清理旧日志
  # ==============================================
  clean-logs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    needs: bilibili-task

    steps:
      - name: 清理所有旧运行日志
        uses: GitRML/delete-workflow-runs@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          retain_days: 0
          keep_minimum_runs: 1
          delete_workflow_pattern: '*'
          delete_consecutive_pages: 20

  # ==============================================
  #  任务3：每15天保活一次（已修复语法错误）
  # ==============================================
  keepalive:
    runs-on: ubuntu-latest
    needs: clean-logs
    # 修复：GitHub 表达式取模用 mod()，不用 %
    if: ${{ mod(github.run_number, 15) == 0 }}

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 15天自动保活（空提交）
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git commit --allow-empty -m "15天自动保活 - 防止GitHub 60天禁用"
          git push origin ${{ github.ref }}
