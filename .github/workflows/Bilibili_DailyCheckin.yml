# ==============================================
#  B站每日自动签到 + 自动清日志 + 15天保活
#  时间：每天 凌晨 01:00（北京时间）
# ==============================================
name: Bilibili每日签到+清日志+15天保活

on:
  schedule:
    - cron: '0 17 * * *'         # 每天凌晨1点签到
    - cron: '0 17 */15 * *'      # 每15天 执行一次保活
  workflow_dispatch:             # 手动触发

jobs:
  # ==============================================
  #  任务1：B站自动签到
  # ==============================================
  bilibili-task:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests loguru

      - name: 执行B站签到任务
        env:
          BILIBILI_COOKIE: ${{ secrets.BILIBILI_COOKIE }}
          PUSH_PLUS_TOKEN: ${{ secrets.PUSH_PLUS_TOKEN }}
          TASK_CONFIG: ${{ secrets.TASK_CONFIG }}
          COIN_ADD_NUM: ${{ secrets.COIN_ADD_NUM }}
          COIN_SELECT_LIKE: ${{ secrets.COIN_SELECT_LIKE }}
          COIN_VIDEO_SOURCE: ${{ secrets.COIN_VIDEO_SOURCE }}
        run: python main.py

  # ==============================================
  #  任务2：每次运行后清理日志
  # ==============================================
  clean-logs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    needs: bilibili-task

    steps:
      - name: 清理旧日志
        uses: GitRML/delete-workflow-runs@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          retain_days: 0
          keep_minimum_runs: 1
          delete_workflow_pattern: '*'
          delete_consecutive_pages: 20

  # ==============================================
  #  任务3：每15天自动保活（无任何语法函数，绝对不报错）
  # ==============================================
  keepalive:
    runs-on: ubuntu-latest
    needs: clean-logs
    # 只有在【每15天那个定时任务】才执行
    if: github.event.schedule == '0 17 */15 * *'

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 15天自动保活
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git commit --allow-empty -m "15天自动保活 - 防止GitHub禁用"
          git push origin ${{ github.ref }}
