# ==============================================
#  B站每日自动签到 + 自动清日志 + 15天保活
#  时间：每天 凌晨 00:00（北京时间）
#  防Cookie3天失效 加强版
# ==============================================
name: Bilibili每日签到+清日志+15天保活

on:
  schedule:
    - cron: '15 16 * * *'         # 错开高峰：00:15 执行
    - cron: '35 16 * * *'         # 双时间随机，避免规律触发风控
  workflow_dispatch:

jobs:
  bilibili-task:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: 设置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests loguru

      - name: 执行B站签到（防风控版）
        env:
          BILIBILI_COOKIE: ${{ secrets.BILIBILI_COOKIE }}
          PUSH_PLUS_TOKEN: ${{ secrets.PUSH_PLUS_TOKEN }}
          COIN_ADD_NUM: ${{ secrets.COIN_ADD_NUM }}
          COIN_SELECT_LIKE: ${{ secrets.COIN_SELECT_LIKE }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          # 防风控：随机延迟 + 模拟浏览器
          RANDOM_SLEEP: "true"
          FAKE_USER_AGENT: "true"
        run: python main.py

  clean-logs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    needs: bilibili-task
    steps:
      - name: 清理旧运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

  keepalive:
    runs-on: ubuntu-latest
    needs: clean-logs
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "🔄 15天自动保活"
          git push
